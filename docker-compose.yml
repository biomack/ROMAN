version: "3.9"

services:
  victoriametrics-mcp:
    image: ghcr.io/victoriametrics-community/mcp-victoriametrics
    environment:
      VM_INSTANCE_ENTRYPOINT: ${VM_INSTANCE_ENTRYPOINT:-https://play.victoriametrics.com}
      VM_INSTANCE_TYPE: ${VM_INSTANCE_TYPE:-cluster}
      MCP_SERVER_MODE: ${MCP_SERVER_MODE:-sse}
      MCP_LISTEN_ADDR: ":8080"
      MCP_LOG_LEVEL: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
