version: "3.9"

services:
  victoriametrics-mcp:
    image: ghcr.io/victoriametrics-community/mcp-victoriametrics
    environment:
      VM_INSTANCE_ENTRYPOINT: ${VM_INSTANCE_ENTRYPOINT:-https://play.victoriametrics.com}
      VM_INSTANCE_TYPE: ${VM_INSTANCE_TYPE:-cluster}
      MCP_SERVER_MODE: ${MCP_SERVER_MODE:-sse}
      MCP_LISTEN_ADDR: ":8080"
      MCP_LOG_LEVEL: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    image: python:3.11-slim
    depends_on:
      - kafka
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn app.api:app --host 0.0.0.0 --port 8000"
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: agent-events
      KAFKA_OUTBOX_TOPIC: agent-outbox
    ports:
      - "8000:8000"

  worker:
    image: python:3.11-slim
    depends_on:
      - kafka
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m app.worker"
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: agent-events
      KAFKA_OUTBOX_TOPIC: agent-outbox

  supervisor:
    image: python:3.11-slim
    depends_on:
      - kafka
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install -r requirements.txt &&
             python -m app.supervisor"
    environment:
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_TOPIC: agent-events
      SUPERVISOR_INTERVAL_SECONDS: 60
      SUPERVISOR_SERVICES: api-gateway,orders-service
