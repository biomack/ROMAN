apiVersion: v1
kind: ConfigMap
metadata:
  name: roman-agent-config
data:
  .env: |
    # Core LLM settings
    LLM_PROVIDER=openai

    # Ollama settings
    OLLAMA_BASE_URL=http://ollama:11434
    OLLAMA_MODEL=openai/gpt-oss-20b

    # OpenAI-compatible settings
    OPENAI_BASE_URL=http://172.16.92.9:1234/v1
    OPENAI_MODEL=openai/gpt-oss-20b
    # Sensitive values are injected from Secret and override this file.
    OPENAI_API_KEY=

    # General
    LLM_TEMPERATURE=0.4
    SKILLS_DIR=skills

    # Session / references
    SESSION_TTL_SECONDS=3600
    SESSION_MAX_MESSAGES=100
    REFERENCE_FILE_MAX_BYTES=32768
    REFERENCE_FILES_TOTAL_MAX_BYTES=262144

    # Mattermost bot settings
    MATTERMOST_URL=im.astralinux.ru
    MATTERMOST_TEAM=astralinux
    MATTERMOST_CHANNEL=xaas-roman-ai
    MATTERMOST_BOT_NAME=impulsexaasbot
    # Sensitive values are injected from Secret and override this file.
    MATTERMOST_TOKEN=

    # MCP Servers
    MCP_SERVERS=VICTORIAMETRICS
    MCP_VICTORIAMETRICS_NAME=victoriametrics-mcp
    MCP_VICTORIAMETRICS_URL=https://play-mcp.victoriametrics.com
    MCP_VICTORIAMETRICS_TRANSPORT=http
